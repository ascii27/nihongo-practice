name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nihongo
          POSTGRES_PASSWORD: nihongo
          POSTGRES_DB: nihongo
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://nihongo:nihongo@localhost:5432/nihongo
      PASSCODE: test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "npm" }
      - run: npm ci
      - run: npm --workspace server run db:migrate
      - run: npm --workspace server test

  e2e:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nihongo
          POSTGRES_PASSWORD: nihongo
          POSTGRES_DB: nihongo
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://nihongo:nihongo@localhost:5432/nihongo
      PASSCODE: test
      NODE_ENV: production
      VITE_API_BASE: http://localhost:3001
      E2E_BASE_URL: http://localhost:3001
      E2E_PASSCODE: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "npm" }
      - run: npm ci
      - run: npm --workspace server run db:migrate
      - run: npm --workspace client run build
      - run: npm --workspace server run build
      - run: npm --workspace e2e run install-browsers
      - name: Start server
        run: |
          npm --workspace server start &
          npx wait-on http://localhost:3001/healthz --timeout 30000
      - run: npm --workspace e2e test
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
